version: '3.8'

services:
  # Streamlit Application
  app:
    build:
      context: ..
      dockerfile: ci/Dockerfile
    container_name: customer-copilot-app
    ports:
      - "8501:8501"
    volumes:
      - ../data/skills:/app/data/skills
      - ../data/policies:/app/data/policies
      - ../data/vector_db:/app/data/vector_db
      - ../logs:/app/logs
    environment:
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MODEL_NANO=${OPENAI_MODEL_NANO:-gpt-4o-nano}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-2000}
      
      # ChromaDB Configuration (local mode - no separate server)
      - CHROMA_MODE=local
      - CHROMADB_PATH=/app/data/vector_db
      - CHROMADB_COLLECTION_KNOWLEDGE=${CHROMADB_COLLECTION_KNOWLEDGE:-hotel_knowledge_base}
      - CHROMADB_COLLECTION_SKILLS=${CHROMADB_COLLECTION_SKILLS:-hotel_skills_registry}
      
      # RAG Configuration
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K_RETRIEVAL=${TOP_K_RETRIEVAL:-10}
      - TOP_K_RERANK=${TOP_K_RERANK:-5}
      - MIN_CONFIDENCE_THRESHOLD=${MIN_CONFIDENCE_THRESHOLD:-0.7}
      - USE_RERANKING=${USE_RERANKING:-true}
      - RERANKER_TYPE=${RERANKER_TYPE:-cross-encoder}
      
      # TPAO Loop Configuration
      - TPAO_MAX_ITERATIONS=${TPAO_MAX_ITERATIONS:-3}
      - TPAO_CONFIDENCE_THRESHOLD=${TPAO_CONFIDENCE_THRESHOLD:-0.7}
      
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_FILE=/app/logs/hotel-copilot.log
      
      # Application Configuration
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
